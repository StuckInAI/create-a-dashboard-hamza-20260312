version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/dashboard.sqlite
      - NEXT_PUBLIC_APP_NAME=Admin Dashboard
    volumes:
      - dashboard_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/stats']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dashboard_data:
    driver: local
